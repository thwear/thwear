name: Sync catalog

on:
  workflow_dispatch:
  schedule:
    # Every hour. GitHub cron runs in UTC.
    - cron: "0 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  sync:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install sync dependencies
        run: npm ci

      - name: Sync Google Drive catalog
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: node scripts/drive-sync.mjs --root 1E6XqPMoxn-xq36Kf4wVkYW3JlupTyjIU --out data/catalog.json

      - name: Commit catalog changes
        id: commit
        run: |
          if git diff --quiet -- data/catalog.json; then
            echo "No catalog changes"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "catalog-sync"
          git config user.email "catalog-sync@users.noreply.github.com"
          git add data/catalog.json
          git commit -m "Atualiza catalogo do Drive"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - uses: actions/configure-pages@v5
        if: steps.commit.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'

      - uses: actions/upload-pages-artifact@v3
        if: steps.commit.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
        if: steps.commit.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
